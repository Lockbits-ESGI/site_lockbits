; Custom PHP configuration for Docker environment
; This file is mounted by docker-compose.yml

memory_limit = ${PHP_MEMORY_LIMIT:-256M}
upload_max_filesize = ${PHP_UPLOAD_MAX_FILESIZE:-10M}
post_max_size = ${PHP_POST_MAX_SIZE:-10M}
max_execution_time = 60
max_input_vars = 3000
date.timezone = UTC

; Error reporting (adjust for production)
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On
error_log = /var/log/php_errors.log

; Session settings
session.save_handler = files
session.save_path = "/var/lib/php/sessions"
session.use_strict_mode = 1
session.cookie_httponly = 1
session.cookie_secure = 0 ; Set to 1 if using HTTPS
