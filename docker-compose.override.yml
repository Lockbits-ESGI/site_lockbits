version: '3.8'

services:
  # Additional service for development: phpMyAdmin
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: lockbits_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
    depends_on:
      - db
    networks:
      - lockbits_network
    restart: unless-stopped
    profiles:
      - dev

networks:
  lockbits_network:
    external: true
